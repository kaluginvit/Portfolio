name: Run AB Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate expanded dataset
        run: |
          python src/augment_dataset.py

      - name: Run analysis
        run: |
          python src/run_analysis.py

      - name: Verify outputs
        run: |
          test -f data/processed/ab_results.csv
          test -f data/processed/sample_size_recommendation.csv
          test -f reports/final_report.md
