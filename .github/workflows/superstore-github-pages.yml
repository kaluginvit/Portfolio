# Публикует интерактивный дашборд как GitHub Pages (корень сайта = один HTML).
# Включите: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy Superstore dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - '01-data-analytics/superstore-retail-analytics/superstore-dashboard.html'
      - '.github/workflows/superstore-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-superstore
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v4
      - name: Prepare static site
        run: |
          mkdir -p _site
          cp "01-data-analytics/superstore-retail-analytics/superstore-dashboard.html" _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
